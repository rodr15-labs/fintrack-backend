name: Python CI - Tests

on:
  push:
    branches:
      - "main"

  pull_request:
    branches:
      - "main"

jobs:
  # Verify self-hosted runner
  check-server:
    runs-on: self-hosted

    steps:
      - name: Ping Lenovo
        run: echo "The runner is ready in the Lenovo server!"

  # Run tests with isolated PostgreSQL service
  test:
    runs-on: self-hosted
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:15

        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: fintrack_db_psw
          POSTGRES_DB: fintrack_test_db

        ports:
          - 5432:5432

        options: >-
          --health-cmd="pg_isready -U admin -d fintrack_test_db"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      TEST_DATABASE_URL: postgresql://admin:fintrack_db_psw@localhost:5432/fintrack_test_db

      DB_USER: admin
      DB_PASSWORD: fintrack_db_psw
      DB_NAME: fintrack_test_db

      PYTHONUNBUFFERED: 1

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run database migrations
        run: |
          alembic upgrade head

      - name: Run tests
        run: |
          pytest -v