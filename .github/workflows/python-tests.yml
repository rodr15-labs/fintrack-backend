name: Python CI - Tests

on:
  push:
    branches:
      - "main"

  pull_request:
    branches:
      - "main"

jobs:

  # Verify self-hosted runner
  check-server:
    runs-on: self-hosted

    steps:
      - name: Ping Lenovo
        run: echo "The runner is ready in the Lenovo server!"

  # Run tests
  test:
    runs-on: self-hosted

    timeout-minutes: 15

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Start PostgreSQL test container
        run: |
          docker compose --profile test up -d

      - name: Wait for PostgreSQL
        run: |
          sleep 10

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migrations
        env:
          TESTING: 1
        run: |
          alembic upgrade head

      - name: Run tests
        env:
          TESTING: 1
        run: |
          pytest -v

      - name: Stop containers
        if: always()
        run: |
          docker compose down -v